<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Conservation Journey</title>
    <!-- Simple Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Clean Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,700;1,300;1,700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Merriweather', serif; }
        
        /* Simple floating animation for background blobs */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float { animation: float-slow 8s ease-in-out infinite; }
    </style>
</head>
<body class="bg-orange-50 text-stone-900">

    <!-- ─────── NEW HERO INTRO ─────── -->
    <header class="relative overflow-hidden bg-orange-50 py-24 md:py-32 px-4 text-center">
        
        <!-- Decorative Background Shapes (No images needed) -->
        <div class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 rounded-full bg-orange-200 opacity-50 blur-3xl animate-float"></div>
        <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 rounded-full bg-orange-300 opacity-40 blur-2xl animate-float" style="animation-delay: 2s;"></div>

        <div class="relative z-10 max-w-4xl mx-auto">
            <!-- Badge -->
            <span class="inline-block py-1.5 px-4 rounded-full bg-orange-100 text-orange-700 text-xs font-bold tracking-widest uppercase mb-6 border border-orange-200 shadow-sm">
                15 Week Challenge
            </span>
            
            <!-- Main Title -->
            <h1 class="text-5xl md:text-7xl font-bold text-orange-900 mb-6 leading-tight">
                My Path to a <br>
                <span class="text-orange-600 italic">Greener Future</span>
            </h1>
            
            <!-- Subtitle -->
            <p class="text-lg md:text-xl text-stone-600 mb-10 leading-relaxed max-w-2xl mx-auto">
                From coastal clean-ups to community gardens, documenting my 15-week journey of small acts with a big impact.
            </p>
            
            <!-- CTA Button -->
            <a href="#journal-container" class="inline-flex items-center gap-3 px-8 py-3.5 bg-orange-600 hover:bg-orange-700 text-white font-semibold rounded-full transition-all shadow-lg hover:shadow-orange-300/50 hover:-translate-y-1">
                Read the Journey
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main id="journal-container" class="max-w-4xl mx-auto p-4 md:p-12 space-y-10">

        <!-- Content generates here via JavaScript -->
        
    </main>

    <!-- Simple Footer -->
    <footer class="bg-orange-950 text-orange-100 py-10 text-center mt-20 border-t border-orange-900">
        <p class="text-sm mt-6 text-orange-400">&copy; 2026 Jesebel E. Azores. All Rights Reserved.</p>
    </footer>

    <script>
        // ──────────────────────────────────────
        //  YOUR DATA (EDIT TEXT & IMAGES HERE)
        // ──────────────────────────────────────
        const weeks = [
            {
                week: 1,
                title: "Community clean-up at Barangay Hall",
                desc: "I participated in a community clean-up activity at the Barangay Hall of Brgy. Malaguining. We worked together to sweep surroundings, collect waste, and maintain cleanliness. It showed the value of teamwork and shared responsibility.",
                // PUT YOUR IMAGE FILENAME HERE (e.g., "week1.jpg")
                // If you don't have images yet, these random ones will show.
                image: "Azores/Week 1/1.png" 
            },
            {
                week: 2,
                title: "Campus sanitation at Elementary School",
                desc: "I participated in a campus sanitation activity. We cleaned school grounds, picked up litter, and ensured surroundings were neat and safe for learners. It highlighted the importance of discipline and cooperation.",
                image: "Azores/Week 2/1.png"
            },
            {
                week: 3,
                title: "River maintenance and sanitation",
                desc: "I took part in a riverbank clean-up activity. We cleaned the surroundings of the small river by collecting garbage and removing debris. It taught me the importance of keeping waterways clean to prevent pollution.",
                image: "Azores/Week 3/1.png"
            },
            {
                week: 4,
                title: "Street sweeping activity",
                desc: "I actively joined a street sweeping activity. We cleaned the roads by sweeping away dirt and collecting litter. It helped maintain cleanliness and improved the surroundings of the community.",
                image: "Azores/Week 4/1.png"
            },
            {
                week: 5,
                title: "Cleaning and unclogging drainage",
                desc: "I joined an activity to clean and unclog drainage canals. We worked together to remove trash and debris blocking the system. This helped improve water flow and prevent possible flooding.",
                image: "Azores/Week 5/1.png"
            },
            {
                week: 6,
                title: "Coastal sanitation activity",
                desc: "I joined a coastal clean-up activity. We cleaned the shoreline by collecting plastic waste and debris along the seaside. It helped protect the marine environment and keep the coast clean.",
                image: "Azores/Week 6/1.jpeg"
            },
            {
                week: 7,
                title: "Constructing a waste container",
                desc: "I took part in a waste bin making activity. We used available materials to create a functional trash bin for the school and community. It taught me creativity and the importance of proper waste management.",
                image: "Azores/Week 7/1.png"
            },
            {
                week: 8,
                title: "DIY waste bin project",
                desc: "I joined a DIY waste bin project for the community. We created and assembled waste bins using recycled materials. It promoted creativity and environmental responsibility.",
                image: "Azores/Week 8/1.jpeg"
            },
            {
                week: 9,
                title: "Garbage segregation activity",
                desc: "I joined a waste segregation activity. We sorted biodegradable and non-biodegradable waste to promote proper waste management. It taught me discipline and the importance of keeping surroundings clean.",
                image: "Azores/Week 9/1.jpeg"
            },
            {
                week: 10,
                title: "Tree planting activity",
                desc: "I took part in a tree planting activity. We planted young trees to help improve the environment and support reforestation. It promoted teamwork and care for nature.",
                image: "Azores/Week 10/1.png"
            },
            {
                week: 11,
                title: "Giving away pre-loved clothes",
                desc: "I gathered used clothes and took part in a donation activity. I shared used clothing with families in need within the community. It promoted kindness and compassion.",
                image: "Azores/Week 11/1.png"
            },
            {
                week: 12,
                title: "Feeding Program in school",
                desc: "I took part in a school feeding activity. We helped prepare and distribute nutritious meals to learners to support their health. It promoted cooperation and care.",
                image: "Azores/Week 12/1.png"
            },
            {
                week: 13,
                title: "Community garden activity",
                desc: "I took part in a community gardening activity. We planted vegetables and helped maintain a shared garden. It promoted teamwork, patience, and responsibility.",
                image: "Azores/Week 13/1.jpeg0"
            },
            {
                week: 14,
                title: "Clean-up drive at Barangay Gymnasium",
                desc: "I took part in a clean-up drive at the Barangay Gymnasium. We cleaned the surroundings by sweeping floors and organizing the area. It taught me the importance of maintaining cleanliness in public places.",
                image: "Azores/Week 14/1.jpeg"
            },
            {
                week: 15,
                title: "Relief goods packing and distribution",
                desc: "I participated in a relief goods packing and distribution activity. We helped pack essential items and distribute them to families in need. It promoted compassion, teamwork, and service.",
                image: "Azores/Week 15/1.jpeg"
            }
        ];

        // ──────────────────────────────────────
        //  GENERATE HTML (DO NOT EDIT BELOW)
        // ──────────────────────────────────────
        const container = document.getElementById('journal-container');

        weeks.forEach((week) => {
            // Create a Card for each week
            const card = document.createElement('div');
            card.className = "bg-white rounded-xl shadow-sm border border-orange-100 overflow-hidden hover:shadow-lg hover:shadow-orange-200/50 transition-all duration-300 transform hover:-translate-y-1";

            card.innerHTML = `
                <div class="flex flex-col md:flex-row">
                    <!-- Image Section -->
                    <div class="md:w-2/5 h-64 md:h-auto relative group">
                        <img src="${week.image}" alt="${week.title}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute top-4 left-4 bg-orange-600 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide shadow-sm z-10">
                            Week ${week.week}
                        </div>
                    </div>
                    
                    <!-- Text Section -->
                    <div class="p-8 md:p-10 md:w-3/5 flex flex-col justify-center bg-white">
                        <h2 class="text-2xl font-bold text-orange-900 mb-4 leading-tight">${week.title}</h2>
                        <div class="h-1 w-12 bg-orange-200 mb-4 rounded-full"></div>
                        <p class="text-stone-600 leading-relaxed">${week.desc}</p>
                    </div>
                </div>
            `;

            container.appendChild(card);
        });
    </script>
</body>
</html>
