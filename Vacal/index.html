<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bright Eco-Footprint — 15 Weeks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts: Pacifico & Fredoka -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            /* Light Cream/Yellow Background */
            background: #FEF9C3; 
            /* Dark Amber/Brown Text */
            color: #78350F; 
            overflow-x: hidden;
        }

        /* ── ambient background blobs ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: rgba(254, 240, 138, 0.7); 
            top: -100px; left: -150px;
            animation: blobDrift1 18s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: rgba(253, 186, 116, 0.6); 
            bottom: -80px; right: -120px;
            animation: blobDrift2 22s ease-in-out infinite alternate;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: rgba(245, 158, 11, 0.15); 
            top: 40%; left: 50%;
            animation: blobDrift3 15s ease-in-out infinite alternate;
        }
        @keyframes blobDrift1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.15); }
        }
        @keyframes blobDrift2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60px, -80px) scale(1.2); }
        }
        @keyframes blobDrift3 {
            0% { transform: translate(-50%, 0) scale(1); }
            100% { transform: translate(-50%, -50px) scale(1.1); }
        }

        /* ── floating particles ── */
        #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            10% { opacity: var(--p-opacity, 0.5); transform: translateY(-10vh) translateX(5px) scale(1); }
            85% { opacity: calc(var(--p-opacity, 0.5) * 0.8); }
            100% { transform: translateY(-105vh) translateX(var(--p-drift, -15px)) scale(0.4); opacity: 0; }
        }

        /* ── hero ── */
        .hero {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }
        .hero-title {
            font-family: 'Pacifico', cursive;
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 400;
            background: linear-gradient(135deg, #F59E0B, #D97706, #B45309);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            line-height: 1.1;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .hero-sub {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: #92400E; 
            margin-top: 1rem;
        }
        .hero-deco {
            color: #F59E0B;
            font-size: 1.5rem;
            margin-top: 1.5rem;
            letter-spacing: 0.5em;
            opacity: 0.8;
        }
        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #D97706;
            font-size: 0.95rem;
            animation: cueBounce 2.2s ease-in-out infinite;
        }
        .scroll-cue span {
            display: block;
            width: 18px; height: 28px;
            border: 2px solid rgba(217, 119, 6, 0.4);
            border-radius: 9px;
            position: relative;
        }
        .scroll-cue span::after {
            content: '';
            position: absolute;
            width: 3px; height: 7px;
            background: #D97706;
            border-radius: 2px;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            animation: cueDot 2.2s ease-in-out infinite;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(8px); opacity: 1; }
        }
        @keyframes cueDot {
            0% { top: 5px; opacity: 1; }
            100% { top: 16px; opacity: 0; }
        }

        /* ── week sections ── */
        .week-section {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
            z-index: 2;
            transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
            transform: scale(0.95);
            filter: blur(2px);
        }
        .week-section.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
        }
        .week-section.near {
            opacity: 0.7;
            transform: scale(0.98);
            filter: blur(1px);
        }
        .week-section.last-week {
            min-height: auto;
            padding: 2.5rem 1rem;
            scroll-snap-align: start;
        }

        .week-card {
            background: rgba(255, 255, 255, 0.7); 
            border: 1px solid rgba(245, 158, 11, 0.3); 
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 620px;
            width: 100%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(217, 119, 6, 0.1);
        }
        .week-section.active .week-card {
            border-color: rgba(245, 158, 11, 0.6);
            box-shadow: 0 10px 40px rgba(245, 158, 11, 0.15);
        }
        .week-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #FCD34D, #F59E0B, #D97706, transparent);
            opacity: 0;
            transition: opacity 0.55s;
        }
        .week-section.active .week-card::before { opacity: 1; }

        .week-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #FEF3C7;
            color: #92400E;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            border: 1px solid #FDE68A;
            font-weight: 600;
        }
        .week-title {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            color: #78350F;
            margin: 0.6rem 0 0.5rem;
            line-height: 1.2;
        }
        .week-desc {
            font-size: 1.05rem;
            color: #92400E;
            line-height: 1.55;
        }

        /* ── photo grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 0.75rem 0;
        }
        .photo-grid.cols-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .photo-grid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 1rem;
            transition: transform 0.35s, filter 0.35s, box-shadow 0.35s;
            filter: brightness(0.9) sepia(0.1);
            background-color: #FEF3C7;
            cursor: pointer;
            border: 2px solid white;
        }
        .week-section.active .photo-grid img:hover {
            transform: scale(1.05);
            filter: brightness(1) sepia(0);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.25);
            z-index: 10;
        }

        /* ── side navigation dots ── */
        .week-nav {
            position: fixed;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 100;
        }
        .week-nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(245, 158, 11, 0.2);
            transition: all 0.35s;
            cursor: pointer;
            border: none;
            padding: 0;
        }
        .week-nav-dot:hover {
            background: rgba(245, 158, 11, 0.5);
        }
        .week-nav-dot.active {
            background: #D97706;
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.4);
            transform: scale(1.4);
        }

        /* ── footer ── */
        .site-footer {
            position: relative;
            z-index: 2;
            background: #FEF3C7;
            border-top: 2px solid #FDE68A;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            min-height: 12vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .footer-deco {
            color: #D97706;
            font-size: 1.2rem;
            letter-spacing: 0.6em;
            opacity: 0.4;
        }
        .footer-name {
            font-family: 'Pacifico', cursive;
            font-size: 1.6rem;
            color: #78350F;
            line-height: 1.4;
        }
        .footer-copy {
            font-size: 0.85rem;
            color: #92400E;
            margin-top: 0.2rem;
        }
        .footer-thanks {
            font-size: 0.9rem;
            color: #D97706;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* ── LIGHTBOX / MODAL STYLES ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(69, 26, 3, 0.9); 
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 1rem;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            object-fit: contain;
            border: 4px solid white;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 2001;
        }
        .close-modal:hover { color: #FCD34D; }

        .modal-caption {
            margin-top: 15px;
            color: #FEF9C3;
            font-size: 1.3rem;
            text-align: center;
            font-family: 'Pacifico', cursive;
        }

        /* ── responsive ── */
        @media (max-width: 640px) {
            .week-card { padding: 1.15rem; }
            .photo-grid img { height: 85px; }
            .week-nav { right: 0.4rem; gap: 0.3rem; }
            .week-nav-dot { width: 6px; height: 6px; }
            .site-footer { padding: 2.5rem 1rem 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- ambient blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- floating particles -->
    <div id="particles"></div>

    <!-- side nav dots -->
    <nav class="week-nav" id="weekNav" aria-label="Week navigation"></nav>

    <main>
        <!-- ═══════ HERO ═══════ -->
        <section class="hero" id="heroSection">
            <!-- CHANGED INTRO TEXT -->
            <div class="hero-title">My Bright Eco-Footprint</div>
            <p class="hero-sub">15 weeks of meaningful actions for our planet 🌻</p>
            <div class="hero-deco">☀️ ✨ 🌻 ☀️ ✨ 🌻</div>
            <div class="scroll-cue">
                <span></span>
                scroll down
            </div>
        </section>

        <!-- ═══════ WEEKS CONTAINER ═══════ -->
        <div id="weeksContainer"></div>

        <!-- ═══════ FOOTER ═══════ -->
        <footer class="site-footer">
            <div class="footer-deco">☀️ ☀️ ☀️</div>
            <p class="footer-name">☀️ Nicole T. Vacal — BSIT 2A ☀️</p>
            <p class="footer-copy">© 2026 Nicole T. Vacal. All Rights Reserved.</p>
            <p class="footer-thanks">shining a light on conservation ⭐</p>
        </footer>
    </main>

    <!-- ═══════ IMAGE MODAL ═══════ -->
    <div id="imgModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="caption" class="modal-caption"></div>
    </div>

<script>
// ──────────────────────────────────────────
//  WEEKS DATA (COMPLETE 15 WEEKS TEMPLATE)
// ──────────────────────────────────────────
const weeks = [
    {
        week: 1,
        title: "Pulling Weeds",
        desc: "Cleaning up around the house by pulling weeds is a great way to help the environment. When you remove weeds from the ground, you help the soil stay healthy and make room for good plants to grow. This simple work keeps the area clean and prevents pests from hiding in the tall grass. By taking care of the earth right where you are, you are doing your part to keep nature beautiful and fresh.",
        photos: ["Week 1/Screenshot 2026-05-16 213440.png"]
    },
    {
        week: 2,
        title: "Glass Bottles",
        desc: "These glass bottles can help in environment conservation because they can be reused and recycled instead of being thrown away. Keeping bottles in the refrigerator shows that they are still useful and not treated as waste.",
        photos: ["Week 2/Screenshot 2026-05-16 213404.png"]
    },
    {
        week: 3,
        title: "Solar Light",
        desc: "This solar light shows environmental conservation because it uses energy from the sun instead of electricity. Solar energy is clean, safe, and helps reduce the use of power from harmful sources. It also saves money and lowers electricity consumption at home. Using solar lights is a simple way to protect the environment and support a greener future.",
        photos: ["Week 3/Screenshot 2026-05-16 213320.png"]
    },
    {
        week: 4,
        title: "Rag",
        desc: "This rag shows environmental conservation because it is made from extra or old clothes instead of throwing them away. Reusing fabric helps reduce waste and gives old materials a new purpose. It can be used for cleaning and other household tasks, making it both useful and eco-friendly. This simple effort helps protect the environment by practicing recycling and reducing trash..",
        photos: ["Week 4/att.f5Nk4J_hI2sHO5FTIRhrkuQ3jMRkOEtU4K_krVmLMYA.png.jpeg", "Week 4/Screenshot 2026-05-16 213214.png"]
    },
    {
        week: 5,
        title: "Container",
        desc: "We usually put dried fish and vinegar in a container like this, but this one is just a reused container instead of buying a new one, which helps us save money and reduce waste.",
        photos: ["Week 5/Screenshot 2026-05-16 212933.png"]
    },
    {
        week: 6,
        title: "Reusing Plastic to Grow New Trees",
        desc: "A great way to help the earth by reusing plastic to grow new trees. Instead of throwing away these plastic tubs, they are being used as small pots to keep young plants safe and healthy as they grow. This simple step helps the environment in two ways: it keeps plastic trash out of our nature and adds more greenery to the world, which helps keep our air clean and fresh.",
        photos: ["Week 6/Screenshot 2026-05-16 212848.png"]
    },
    {
        week: 7,
        title: "Candy Container",
        desc: "Using  plastic jars as a candy container is a smart way to help the environment through reusing. Instead of buying new organizers or throwing these jars away, they are used to keep snacks neat and dry. This effort reduces plastic waste and shows how simple household items can be given a second life. By making the most of what we already have, we help keep our surroundings clean and protect the planet from extra trash.",
        photos: ["Week 7/Screenshot 2026-05-16 212750.png"]
    },
    {
        week: 8,
        title: "Mask",
        desc: "This mask shows an environmental conservation because it is made using newspaper, which is a recyclable material. Instead of throwing the newspaper away, it was reused to create a unique and creative mask. The paint and colorful designs make it more attractive while still promoting recycling.",
        photos: ["Week 8/Screenshot 2026-05-16 212642.png"]
    },
    {
        week: 9,
        title: "Large Plastic Bag",
        desc: "This shows a smart environment conservation effort by reusing a large plastic bag to hold smaller snack wrappers. Instead of buying a new cellophane or plastic bag to store things, you are giving this one a second life.",
        photos: ["Week 9/Screenshot 2026-05-16 212114.png", "Week 9/Screenshot 2026-05-16 212130.png"]
    },
    {
        week: 10,
        title: "Washing Clothes by Hand in a Basin",
        desc: "Washing clothes by hand in a basin is a simple way to help the earth because it saves electricity. Instead of using a washing machine that uses a lot of energy and water, doing it by hand helps protect our natural resources.",
        photos: ["Week 10/Screenshot 2026-05-16 211944.png", "Week 10/Screenshot 2026-05-16 212001.png"]
    },
    {
        week: 11,
        title: "Ecobrick",
        desc: "The environment conservation effort called an ecobrick. By stuffing clean, dry plastic waste into a plastic bottle, you are keeping trash out of the ocean and landfills where it could harm animals. These heavy bricks can even be used for building projects, giving \"junk\" a brand new purpose. This simple habit is a great way to reduce plastic pollution and help keep our beautiful world clean and green.",
        photos: ["Week 11/image 1.png", "Week 11/image 2.jpg"]
    },
    {
        week: 12,
        title: "Box",
        desc: "This box shows our environmental conservation effort by reusing old cardboard cartons instead of throwing them away. We turned simple waste materials into a useful and creative exhibit box. By recycling cartons, we help reduce trash and save resources.",
        photos: ["Week 12/att.oOOCtVZgwFLLKqf0wPaIb6mcd68_E7Du3ELaENKyjdU.jpg", "Week 12/att.vBnur3gwN-9rH1DfFHU_jFNlaxWIKAwalzSRz-6gHdQ.jpg"]
    },
    {
        week: 13,
        title: "Mistake Bond Paper",
        desc: "I made a mistake when printing on this bond paper, so instead of wasting it, I used the back side to create a reviewer for studying.",
        photos: ["Week 13/image 1.png", "Week 13/image 2.png"]
    },
    {
        week: 14,
        title: "Solar light",
        desc: "My mom bought a new solar light for the bathroom because it helps save money on our electricity bill compared to using a regular electric light.",
        photos: ["Week 14/image 1.png"]
    },
    {
        week: 15,
        title: "Three Reduce, Reuse, and Recycle",
        desc: "These three bins are a great way to help the earth by practicing Reduce, Reuse, and Recycle. By putting different kinds of trash in separate bins, we make it easier to turn old things into new products instead of just leaving them in the ground.",
        photos: ["Week 15/image 1.png"]
    }
];

// ──────────────────────────────────────────
//  RENDER WEEK SECTIONS
// ──────────────────────────────────────────
const container = document.getElementById('weeksContainer');

weeks.forEach((w, i) => {
    const section = document.createElement('section');
    const isLast = w.week === 15;
    section.className = 'week-section' + (isLast ? ' last-week' : '');
    section.id = `week-${w.week}`;
    section.setAttribute('data-week', w.week);

    const photoClass = isLast ? 'photo-grid cols-3' : 'photo-grid';

    let photosHTML = w.photos.map(photo =>
    `<img src="${photo}" alt="Week ${w.week} documentation" loading="lazy" onerror="this.onerror=null; this.src='https://picsum.photos/seed/${w.week}/200/300.jpg'; this.alt='Image not found in ${photo}';">`
    ).join('');

    let extrasHTML = '';
    if (w.reflection) {
        extrasHTML += `
            <div class="reflection-box">
                <div class="reflection-label">☀️ My Reflection</div>
                <p class="reflection-text">${w.reflection}</p>
            </div>`;
    }
    if (w.commitments) {
        const items = w.commitments.map(c => `<li>${c}</li>`).join('');
        extrasHTML += `
            <div class="commitment-box">
                <div class="commitment-label">⭐ Habit Commitments</div>
                <ul class="commitment-list">${items}</ul>
            </div>`;
    }

    section.innerHTML = `
        <div class="week-card">
            <div class="week-badge">☀️ week ${w.week}</div>
            <h2 class="week-title">${w.title}</h2>
            <div class="${photoClass}">${photosHTML}</div>
            <p class="week-desc">${w.desc}</p>
            ${extrasHTML}
        </div>
    `;

    container.appendChild(section);
});

// ──────────────────────────────────────────
//  SIDE NAVIGATION DOTS
// ──────────────────────────────────────────
const nav = document.getElementById('weekNav');
const allSections = [document.getElementById('heroSection'), ...document.querySelectorAll('.week-section')];

allSections.forEach((sec, i) => {
    const dot = document.createElement('button');
    dot.className = 'week-nav-dot';
    dot.setAttribute('aria-label', i === 0 ? 'Hero' : `Week ${i}`);
    dot.addEventListener('click', () => sec.scrollIntoView({ behavior: 'smooth' }));
    nav.appendChild(dot);
});

const dots = nav.querySelectorAll('.week-nav-dot');

// ──────────────────────────────────────────
//  SCROLL EMPHASIS LOGIC
// ──────────────────────────────────────────
const weekSections = document.querySelectorAll('.week-section');

function updateEmphasis() {
    const vpCenter = window.innerHeight / 2;
    let activeIdx = -1;
    let minDist = Infinity;

    allSections.forEach((sec, i) => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        if (dist < minDist) {
            minDist = dist;
            activeIdx = i;
        }
    });

    dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx));

    weekSections.forEach(sec => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        const threshold = window.innerHeight * 0.4;

        sec.classList.remove('active', 'near');
        if (dist < threshold * 0.5) {
            sec.classList.add('active');
        } else if (dist < threshold) {
            sec.classList.add('near');
        }
    });
}

window.addEventListener('scroll', updateEmphasis, { passive: true });
window.addEventListener('resize', updateEmphasis);
updateEmphasis();

// ──────────────────────────────────────────
//  FLOATING PARTICLES
// ──────────────────────────────────────────
const particleContainer = document.getElementById('particles');
const particleColors = [
    'rgba(120, 53, 15, 0.9)',   /* Dark Brown */
    'rgba(180, 83, 9, 0.9)',    /* Deep Orange */
    'rgba(217, 119, 6, 0.9)',   /* Strong Orange */
    'rgba(194, 65, 12, 0.9)',   /* Red-Orange */
];

function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';

    const size = Math.random() * 6 + 3;
    const left = Math.random() * 100;
    const dur = Math.random() * 14 + 10;
    const delay = Math.random() * 8;
    const color = particleColors[Math.floor(Math.random() * particleColors.length)];
    const drift = (Math.random() - 0.5) * 60;
    const opacity = Math.random() * 0.3 + 0.5;

    p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        bottom: -10px;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color};
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        --p-drift: ${drift}px;
        --p-opacity: ${opacity};
    `;

    particleContainer.appendChild(p);
}

for (let i = 0; i < 30; i++) createParticle();

// ──────────────────────────────────────────
//  IMAGE MODAL LOGIC (LIGHTBOX)
// ──────────────────────────────────────────
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("modalImg");
const captionText = document.getElementById("caption");
const closeModal = document.querySelector(".close-modal");

// Attach click event to all images in the grid
document.querySelectorAll('.photo-grid img').forEach(img => {
    img.addEventListener('click', function() {
        modal.classList.add('show');
        modalImg.src = this.src;
        
        captionText.innerHTML = this.alt.replace(" documentation", "");
        document.body.style.overflow = "hidden"; 
    });
});

function hideModal() {
    modal.classList.remove('show');
    document.body.style.overflow = "auto"; 
}

closeModal.addEventListener('click', hideModal);

modal.addEventListener('click', function(e) {
    if (e.target === modal) {
        hideModal();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === "Escape" && modal.classList.contains('show')) {
        hideModal();
    }
});
</script>
</body>
