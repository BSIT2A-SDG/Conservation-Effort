<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Conservation Journey — 15 Weeks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Patrick Hand', sans-serif;
            background: #0a0712;
            color: #e2d1f9;
            overflow-x: hidden;
            cursor: default;
        }

        /* ─── MOUSE SPOTLIGHT EFFECT ─── */
        #cursor-light {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                600px circle at var(--x, 50%) var(--y, 50%), 
                rgba(124, 58, 237, 0.15), 
                transparent 40%
            );
            mix-blend-mode: screen;
            transition: opacity 0.3s;
        }

        /* ─── NOISE TEXTURE OVERLAY ─── */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* ── ambient background blobs ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.25) 0%, rgba(0,0,0,0) 70%);
            top: -150px; left: -200px;
            animation: blobDrift1 20s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px; right: -150px;
            animation: blobDrift2 25s ease-in-out infinite alternate;
        }
        @keyframes blobDrift1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 80px) scale(1.1); }
        }
        @keyframes blobDrift2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-80px, -100px) scale(1.2); }
        }

        /* ── VISIBLE FLOATING PARTICLES ── */
        #particles { 
            position: fixed; 
            inset: 0; 
            pointer-events: none; 
            z-index: 2; /* Behind content, but visible against the dark bg */
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #fff; 
            /* Restored glow for visibility, but kept softer than original */
            box-shadow: 0 0 8px 2px rgba(192, 132, 252, 0.6); 
            animation: floatUp linear infinite;
            mix-blend-mode: screen; 
            will-change: transform, opacity;
        }
        @keyframes floatUp {
            0% { 
                transform: translateY(0) translateX(0) scale(0.8); 
                opacity: 0; 
            }
            10% { 
                opacity: var(--p-opacity, 0.7); /* Brighter entry */
                transform: translateY(-10vh) translateX(10px) scale(1); 
            }
            90% { 
                opacity: calc(var(--p-opacity, 0.7) * 0.6); 
            }
            100% { 
                transform: translateY(-110vh) translateX(var(--p-drift, -20px)) scale(0.8); 
                opacity: 0; 
            }
        }

        /* ── hero ── */
        .hero {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 2rem;
        }
        .hero-title {
            font-size: clamp(2.4rem, 7.5vw, 4.8rem);
            font-weight: 400;
            background: linear-gradient(135deg, #fff, #c084fc, #a855f7, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s linear infinite, heroFloat 6s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            line-height: 1.3;
        }
        @keyframes heroFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        .hero-sub {
            font-size: clamp(1.1rem, 2.8vw, 1.45rem);
            color: #e9d5ff;
            margin-top: 0.75rem;
            animation: fadeIn 1.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); }}
        
        .hero-deco {
            color: #d8b4fe;
            font-size: 1.5rem;
            margin-top: 1.5rem;
            letter-spacing: 0.5em;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(216, 180, 254, 0.6);
        }
        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #c4b5fd;
            font-size: 0.95rem;
            animation: cueBounce 2.2s ease-in-out infinite;
        }
        .scroll-cue span {
            display: block;
            width: 18px; height: 28px;
            border: 2px solid rgba(196, 181, 253, 0.6);
            border-radius: 9px;
            position: relative;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .scroll-cue span::after {
            content: '';
            position: absolute;
            width: 3px; height: 7px;
            background: #fff;
            border-radius: 2px;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 8px #fff;
            animation: cueDot 2.2s ease-in-out infinite;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(8px); opacity: 1; }
        }
        @keyframes cueDot {
            0% { top: 5px; opacity: 1; }
            100% { top: 16px; opacity: 0; }
        }

        /* ── week sections ── */
        .week-section {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            opacity: 0.2;
            transform: scale(0.9) translateY(20px);
            filter: blur(4px);
        }
        .week-section.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            filter: blur(0);
            z-index: 15;
        }
        .week-section.near {
            opacity: 0.6;
            transform: scale(0.95) translateY(10px);
            filter: blur(2px);
        }
        .week-section.last-week {
            min-height: auto;
            padding: 2.5rem 1rem;
            scroll-snap-align: start;
        }

        .week-card {
            background: rgba(20, 10, 40, 0.65); /* Slightly more opaque to ensure text readability over particles */
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 640px;
            width: 100%;
            backdrop-filter: blur(25px); /* Increased blur to soften particles behind text */
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        /* Enhanced Active State for "Pop" */
        .week-section.active .week-card {
            border-color: rgba(216, 180, 254, 0.5);
            background: rgba(30, 15, 60, 0.75);
            /* Complex Glow */
            box-shadow: 
                0 0 0 1px rgba(168, 85, 247, 0.1),
                0 20px 50px -10px rgba(0,0,0,0.6),
                0 0 40px rgba(168, 85, 247, 0.15),
                inset 0 0 20px rgba(168, 85, 247, 0.05);
            transform: translateY(-5px);
        }
        .week-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff, #c084fc, #a855f7, transparent);
            opacity: 0.3;
            transition: opacity 0.5s;
            filter: blur(2px);
        }
        .week-section.active .week-card::before { opacity: 1; filter: blur(0); }

        .week-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(168, 85, 247, 0.4));
            color: #fff;
            padding: 0.25rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .week-title {
            font-size: 1.9rem;
            color: #ffffff;
            margin: 0.8rem 0 0.6rem;
            line-height: 1.3;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(168, 85, 247, 0.4);
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }
        .week-section.active .week-title {
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8), 0 0 25px rgba(216, 180, 254, 0.6);
        }
        .week-desc {
            font-size: 1.05rem;
            color: #ddd6fe;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* ── photo grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin: 1rem 0;
        }
        .photo-grid.cols-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .photo-grid img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.4s, box-shadow 0.4s;
            filter: brightness(0.5) grayscale(0.4) saturate(0.8);
            background-color: rgba(255,255,255,0.05);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 2; /* Ensure images are above particles */
        }
        .week-section.active .photo-grid img {
            filter: brightness(1) grayscale(0) saturate(1);
        }
        .week-section.active .photo-grid img:hover {
            transform: scale(1.08) translateY(-3px);
            filter: brightness(1.15) saturate(1.2);
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4);
            z-index: 5;
            border-color: rgba(216, 180, 254, 0.4);
        }

        /* ── week 15 extras ── */
        .reflection-box {
            background: rgba(124, 58, 237, 0.15);
            border-left: 4px solid #c084fc;
            border-radius: 0 0.8rem 0.8rem 0;
            padding: 1rem 1.2rem;
            margin-top: 0.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .reflection-label {
            font-size: 0.95rem;
            color: #e9d5ff;
            margin-bottom: 0.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .reflection-text {
            font-size: 1rem;
            color: #f3e8ff;
            line-height: 1.7;
        }
        .commitment-box {
            margin-top: 0.8rem;
        }
        .commitment-label {
            font-size: 0.95rem;
            color: #e9d5ff;
            margin-bottom: 0.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .commitment-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem 1rem;
        }
        .commitment-list li {
            font-size: 0.95rem;
            color: #f3e8ff;
            padding: 0.25rem 0 0.25rem 1.5rem;
            position: relative;
            line-height: 1.5;
        }
        .commitment-list li::before {
            content: '♡';
            position: absolute;
            left: 0;
            color: #c084fc;
            font-size: 0.8rem;
            top: 0.35rem;
        }

        /* ── side navigation dots ── */
        .week-nav {
            position: fixed;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 100;
        }
        .week-nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: none;
            padding: 0;
        }
        .week-nav-dot:hover {
            background: rgba(168, 85, 247, 0.6);
            transform: scale(1.3);
        }
        .week-nav-dot.active {
            background: #fff;
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.8), 0 0 30px rgba(168, 85, 247, 0.4);
            transform: scale(1.4);
        }

        /* ── footer ── */
        .site-footer {
            position: relative;
            z-index: 10;
            background: rgba(10, 7, 18, 0.8);
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            min-height: 15vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            backdrop-filter: blur(10px);
        }
        .footer-deco {
            color: #d8b4fe;
            font-size: 1.2rem;
            letter-spacing: 0.6em;
            opacity: 0.6;
            text-shadow: 0 0 10px rgba(216, 180, 254, 0.4);
        }
        .footer-name {
            font-size: 1.1rem;
            color: #e9d5ff;
            line-height: 1.4;
        }
        .footer-copy {
            font-size: 0.85rem;
            color: rgba(167, 139, 250, 0.5);
            margin-top: 0.2rem;
        }
        .footer-thanks {
            font-size: 0.9rem;
            color: rgba(192, 132, 252, 0.4);
            margin-top: 0.5rem;
        }

        /* ── LIGHTBOX / MODAL STYLES ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 2, 15, 0.95);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(168, 85, 247, 0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            object-fit: contain;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 60px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            z-index: 2001;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
        }

        .close-modal:hover {
            color: #c084fc;
            transform: rotate(90deg);
        }

        .modal-caption {
            margin-top: 20px;
            color: #e9d5ff;
            font-size: 1.3rem;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            background: rgba(0,0,0,0.4);
            padding: 0.5rem 1rem;
            border-radius: 99px;
        }

        /* ── responsive ── */
        @media (max-width: 640px) {
            .week-card { padding: 1.2rem; }
            .photo-grid img { height: 90px; }
            .week-nav { right: 0.5rem; gap: 0.6rem; }
            .week-nav-dot { width: 8px; height: 8px; }
            .commitment-list { grid-template-columns: 1fr; }
            .week-title { font-size: 1.4rem; }
            .site-footer { padding: 2.5rem 1rem 1.8rem; }
            #cursor-light { display: none; }
        }
    </style>
</head>
<body>

    <!-- Interactive Mouse Spotlight -->
    <div id="cursor-light"></div>
    
    <!-- Noise Texture -->
    <div class="noise-overlay"></div>

    <!-- ambient blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- floating particles -->
    <div id="particles"></div>

    <!-- side nav dots -->
    <nav class="week-nav" id="weekNav" aria-label="Week navigation"></nav>

    <main>
        <!-- ═══════ HERO ═══════ -->
        <section class="hero" id="heroSection">
            <div class="hero-title">My Conservation Journey</div>
            <p class="hero-sub">15 weeks of small acts for a bigger purpose ♡</p>
            <div class="hero-deco">♡ ♡ ♡ ♡ ♡</div>
            <div class="scroll-cue">
                <span></span>
                scroll down
            </div>
        </section>

        <!-- ═══════ WEEKS CONTAINER ═══════ -->
        <div id="weeksContainer"></div>

        <!-- ═══════ FOOTER ═══════ -->
        <footer class="site-footer">
            <div class="footer-deco">♡ ♡ ♡</div>
            <p class="footer-name">♡ Rai Anjela N. Mangao — BSIT 2A ♡</p>
            <p class="footer-copy">© 2026 Rai Anjela N. Mangao. All Rights Reserved.</p>
            <p class="footer-thanks">made with love for the earth ♡</p>
        </footer>
    </main>

    <!-- ═══════ IMAGE MODAL ═══════ -->
    <div id="imgModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="caption" class="modal-caption"></div>
    </div>

<script>
// ──────────────────────────────────────────
//  MOUSE TRACKING (SPOTLIGHT EFFECT)
// ──────────────────────────────────────────
const cursorLight = document.getElementById('cursor-light');
document.addEventListener('mousemove', (e) => {
    cursorLight.style.setProperty('--x', e.clientX + 'px');
    cursorLight.style.setProperty('--y', e.clientY + 'px');
});

// ──────────────────────────────────────────
//  WEEKS DATA
// ──────────────────────────────────────────

    {

//  RENDER WEEK SECTIONS
// ──────────────────────────────────────────
const container = document.getElementById('weeksContainer');

weeks.forEach((w, i) => {
    const section = document.createElement('section');
    const isLast = w.week === 15;
    section.className = 'week-section' + (isLast ? ' last-week' : '');
    section.id = `week-${w.week}`;
    section.setAttribute('data-week', w.week);

    const photoClass = isLast ? 'photo-grid cols-3' : 'photo-grid';

    let photosHTML = w.photos.map(photo =>
    `<img src="${photo}" alt="Week ${w.week} documentation" loading="lazy" onerror="this.onerror=null; this.src='https://picsum.photos/seed/${w.week}/200/300.jpg'; this.alt='Image not found in ${photo}';">`
    ).join('');

    let extrasHTML = '';
    if (w.reflection) {
        extrasHTML += `
            <div class="reflection-box">
                <div class="reflection-label">♡ My Reflection</div>
                <p class="reflection-text">${w.reflection}</p>
            </div>`;
    }
    if (w.commitments) {
        const items = w.commitments.map(c => `<li>${c}</li>`).join('');
        extrasHTML += `
            <div class="commitment-box">
                <div class="commitment-label">♡ Habit Commitments</div>
                <ul class="commitment-list">${items}</ul>
            </div>`;
    }

    section.innerHTML = `
        <div class="week-card">
            <div class="week-badge">♡ week ${w.week}</div>
            <h2 class="week-title">🌷 ${w.title}</h2>
            <div class="${photoClass}">${photosHTML}</div>
            <p class="week-desc">${w.desc}</p>
            ${extrasHTML}
        </div>
    `;

    container.appendChild(section);
});

const nav = document.getElementById('weekNav');

allSections.forEach((sec, i) => {

    dot.addEventListener('click', () => sec.scrollIntoView({ behavior: 'smooth' }));
    nav.appendChild(dot);
});

const dots = nav.querySelectorAll('.week-nav-dot');

// ──────────────────────────────────────────
//  SCROLL EMPHASIS LOGIC
// ──────────────────────────────────────────
const weekSections = document.querySelectorAll('.week-section');

function updateEmphasis() {
    const vpCenter = window.innerHeight / 2;
    let activeIdx = -1;
    let minDist = Infinity;

    allSections.forEach((sec, i) => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        if (dist < minDist) {
            minDist = dist;
            activeIdx = i;
        }
    });

    dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx));

    weekSections.forEach(sec => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        const threshold = window.innerHeight * 0.45;

        sec.classList.remove('active', 'near');
        if (dist < threshold * 0.4) {
            sec.classList.add('active');
        } else if (dist < threshold) {
            sec.classList.add('near');
        }
    });
}

window.addEventListener('scroll', updateEmphasis, { passive: true });
window.addEventListener('resize', updateEmphasis);
updateEmphasis();

// ──────────────────────────────────────────
//  FLOATING PARTICLES (MORE VISIBLE)
// ──────────────────────────────────────────
const particleContainer = document.getElementById('particles');

function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';

    // Balanced size: 3px to 6px
    const size = Math.random() * 3 + 3; 
    const left = Math.random() * 100;
    const dur = Math.random() * 10 + 8; // Duration between 8s and 18s
    const delay = Math.random() * 5;
    const drift = (Math.random() - 0.5) * 100; 
    // INCREASED OPACITY: 0.4 to 0.8 for better visibility
    const opacity = Math.random() * 0.4 + 0.4; 

    p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        bottom: -20px;
        --p-drift: ${drift}px;
        --p-opacity: ${opacity};
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
    `;

    particleContainer.appendChild(p);
}

// 45 particles for a balanced look
for (let i = 0; i < 45; i++) createParticle();


// ──────────────────────────────────────────
//  IMAGE MODAL LOGIC (LIGHTBOX)
// ──────────────────────────────────────────
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("modalImg");
const captionText = document.getElementById("caption");
const closeModal = document.querySelector(".close-modal");

// Attach click event to all images in the grid
document.querySelectorAll('.photo-grid img').forEach(img => {
    img.addEventListener('click', function() {
        modal.classList.add('show');
        modalImg.src = this.src;
        
        captionText.innerHTML = this.alt.replace(" documentation", "");
        document.body.style.overflow = "hidden"; // Stop background scrolling
    });
});

// Close functions
function hideModal() {
    modal.classList.remove('show');
    document.body.style.overflow = "auto"; // Restore scrolling
}

// Click the X
closeModal.addEventListener('click', hideModal);

// Click the background
modal.addEventListener('click', function(e) {
    if (e.target === modal) {
        hideModal();
    }
});

// Press Escape key
document.addEventListener('keydown', function(e) {
    if (e.key === "Escape" && modal.classList.contains('show')) {
        hideModal();
    }
});
</script>
