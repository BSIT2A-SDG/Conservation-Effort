<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Sweet Sustainability Journey — 15 Weeks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts: Dancing Script & Quicksand -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            /* Light Pastel Pink Background */
            background: #fff0f5; 
            /* Dark Pink Text */
            color: #831843; 
            overflow-x: hidden;
        }

        /* ── ambient background blobs (Light Pastel Theme) ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: rgba(252, 231, 243, 0.8); /* Light Pink */
            top: -100px; left: -150px;
            animation: blobDrift1 18s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: rgba(251, 207, 232, 0.7); /* Pink 200 */
            bottom: -80px; right: -120px;
            animation: blobDrift2 22s ease-in-out infinite alternate;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: rgba(244, 114, 182, 0.15); /* Pink 400 transparent */
            top: 40%; left: 50%;
            animation: blobDrift3 15s ease-in-out infinite alternate;
        }
        @keyframes blobDrift1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.15); }
        }
        @keyframes blobDrift2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60px, -80px) scale(1.2); }
        }
        @keyframes blobDrift3 {
            0% { transform: translate(-50%, 0) scale(1); }
            100% { transform: translate(-50%, -50px) scale(1.1); }
        }

        /* ── floating particles ── */
        #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
            10% { opacity: var(--p-opacity, 0.5); transform: translateY(-10vh) translateX(5px) scale(1); }
            85% { opacity: calc(var(--p-opacity, 0.5) * 0.8); }
            100% { transform: translateY(-105vh) translateX(var(--p-drift, -15px)) scale(0.4); opacity: 0; }
        }

        /* ── hero ── */
        .hero {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 2;
            padding: 2rem;
        }
        .hero-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 10vw, 6rem);
            font-weight: 700;
            /* Dark Pink Gradient */
            background: linear-gradient(135deg, #db2777, #be185d, #9d174d);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 5s ease infinite;
            line-height: 1.1;
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .hero-sub {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: #9d174d;
            margin-top: 1rem;
        }
        .hero-deco {
            color: #f472b6;
            font-size: 1.5rem;
            margin-top: 1.5rem;
            letter-spacing: 0.5em;
            opacity: 0.8;
        }
        .scroll-cue {
            position: absolute;
            bottom: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            color: #db2777;
            font-size: 0.95rem;
            animation: cueBounce 2.2s ease-in-out infinite;
        }
        .scroll-cue span {
            display: block;
            width: 18px; height: 28px;
            border: 2px solid rgba(219, 39, 119, 0.4);
            border-radius: 9px;
            position: relative;
        }
        .scroll-cue span::after {
            content: '';
            position: absolute;
            width: 3px; height: 7px;
            background: #db2777;
            border-radius: 2px;
            top: 5px; left: 50%;
            transform: translateX(-50%);
            animation: cueDot 2.2s ease-in-out infinite;
        }
        @keyframes cueBounce {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(8px); opacity: 1; }
        }
        @keyframes cueDot {
            0% { top: 5px; opacity: 1; }
            100% { top: 16px; opacity: 0; }
        }

        /* ── week sections ── */
        .week-section {
            min-height: 100vh;
            scroll-snap-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1rem;
            position: relative;
            z-index: 2;
            transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
            transform: scale(0.95);
            filter: blur(2px);
        }
        .week-section.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
        }
        .week-section.near {
            opacity: 0.7;
            transform: scale(0.98);
            filter: blur(1px);
        }
        .week-section.last-week {
            min-height: auto;
            padding: 2.5rem 1rem;
            scroll-snap-align: start;
        }

        .week-card {
            /* White Card with Pink Tint */
            background: rgba(255, 255, 255, 0.7); 
            border: 1px solid rgba(244, 114, 182, 0.3); 
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-width: 620px;
            width: 100%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(219, 39, 119, 0.1);
        }
        .week-section.active .week-card {
            border-color: rgba(219, 39, 119, 0.5);
            box-shadow: 0 10px 40px rgba(219, 39, 119, 0.15);
        }
        .week-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, #f472b6, #db2777, #f472b6, transparent);
            opacity: 0;
            transition: opacity 0.55s;
        }
        .week-section.active .week-card::before { opacity: 1; }

        .week-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #fce7f3;
            color: #9d174d;
            padding: 0.3rem 0.8rem;
            border-radius: 999px;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            border: 1px solid #fbcfe8;
            font-weight: 700;
        }
        .week-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #831843;
            margin: 0.6rem 0 0.5rem;
            line-height: 1.2;
        }
        .week-desc {
            font-size: 1.05rem;
            color: #9f1239;
            line-height: 1.55;
        }

        /* ── photo grid ── */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin: 0.75rem 0;
        }
        .photo-grid.cols-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .photo-grid img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 1rem;
            transition: transform 0.35s, filter 0.35s, box-shadow 0.35s;
            filter: brightness(0.9) sepia(0.1);
            background-color: #fce7f3;
            cursor: pointer;
            border: 2px solid white;
        }
        .week-section.active .photo-grid img:hover {
            transform: scale(1.05);
            filter: brightness(1) sepia(0);
            box-shadow: 0 8px 25px rgba(219, 39, 119, 0.25);
            z-index: 10;
        }

        /* ── week 15 extras ── */
        .reflection-box {
            background: #fdf2f8;
            border-left: 4px solid #db2777;
            border-radius: 0 1rem 1rem 0;
            padding: 0.75rem 1rem;
            margin-top: 0.6rem;
        }
        .reflection-label {
            font-size: 0.9rem;
            color: #be185d;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }
        .reflection-text {
            font-size: 1rem;
            color: #831843;
            line-height: 1.6;
        }
        .commitment-box {
            margin-top: 0.6rem;
        }
        .commitment-label {
            font-size: 0.9rem;
            color: #be185d;
            margin-bottom: 0.35rem;
            font-weight: 700;
        }
        .commitment-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.2rem 0.75rem;
        }
        .commitment-list li {
            font-size: 0.92rem;
            color: #831843;
            padding: 0.2rem 0 0.2rem 1.3rem;
            position: relative;
            line-height: 1.45;
        }
        .commitment-list li::before {
            content: '💖';
            position: absolute;
            left: 0;
            font-size: 0.7rem;
            top: 0.3rem;
        }

        /* ── side navigation dots ── */
        .week-nav {
            position: fixed;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 100;
        }
        .week-nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(219, 39, 119, 0.2);
            transition: all 0.35s;
            cursor: pointer;
            border: none;
            padding: 0;
        }
        .week-nav-dot:hover {
            background: rgba(219, 39, 119, 0.5);
        }
        .week-nav-dot.active {
            background: #db2777;
            box-shadow: 0 0 10px rgba(219, 39, 119, 0.4);
            transform: scale(1.4);
        }

        /* ── footer ── */
        .site-footer {
            position: relative;
            z-index: 2;
            background: #fce7f3;
            border-top: 2px solid #fbcfe8;
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            min-height: 12vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .footer-deco {
            color: #db2777;
            font-size: 1.2rem;
            letter-spacing: 0.6em;
            opacity: 0.4;
        }
        .footer-name {
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #831843;
            line-height: 1.4;
        }
        .footer-copy {
            font-size: 0.85rem;
            color: #9f1239;
            margin-top: 0.2rem;
        }
        .footer-thanks {
            font-size: 0.9rem;
            color: #db2777;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* ── LIGHTBOX / MODAL STYLES (Light Theme) ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            /* Dark Pink Overlay to make photo pop */
            background-color: rgba(131, 24, 67, 0.9); 
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 1rem;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            object-fit: contain;
            border: 4px solid white;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            z-index: 2001;
        }
        .close-modal:hover { color: #fbcfe8; }

        .modal-caption {
            margin-top: 15px;
            color: #fce7f3;
            font-size: 1.3rem;
            text-align: center;
            font-family: 'Dancing Script', cursive;
        }

        /* ── responsive ── */
        @media (max-width: 640px) {
            .week-card { padding: 1.15rem; }
            .photo-grid img { height: 85px; }
            .week-nav { right: 0.4rem; gap: 0.3rem; }
            .week-nav-dot { width: 6px; height: 6px; }
            .commitment-list { grid-template-columns: 1fr; }
            .site-footer { padding: 2.5rem 1rem 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- ambient blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- floating particles -->
    <div id="particles"></div>

    <!-- side nav dots -->
    <nav class="week-nav" id="weekNav" aria-label="Week navigation"></nav>

    <main>
        <!-- ═══════ HERO ═══════ -->
        <section class="hero" id="heroSection">
            <div class="hero-title">My Sustainability Journey</div>
            <p class="hero-sub">15 weeks of loving the planet 💖</p>
            <div class="hero-deco">♡ 💖 ✨ ♡ 💖 ✨</div>
            <div class="scroll-cue">
                <span></span>
                scroll down
            </div>
        </section>

        <!-- ═══════ WEEKS CONTAINER ═══════ -->
        <div id="weeksContainer"></div>

        <!-- ═══════ FOOTER ═══════ -->
        <footer class="site-footer">
            <div class="footer-deco">💖 💖 💖</div>
            <p class="footer-name">💖 Angela May N. Olasiman — BSIT 2A 💖</p>
            <p class="footer-copy">© 2026 Angela May N. Olasiman. All Rights Reserved.</p>
            <p class="footer-thanks">created with love for mother earth ✨</p>
        </footer>
    </main>

    <!-- ═══════ IMAGE MODAL ═══════ -->
    <div id="imgModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="caption" class="modal-caption"></div>
    </div>

<script>
// ──────────────────────────────────────────
//  WEEKS DATA (COMPLETE 15 WEEKS TEMPLATE)
//  NOTE: Change the 'photos' paths to match the actual files in your folders!
// ──────────────────────────────────────────
const weeks = [
    {
        week: 1,
        title: "Upcycled Foot Sacs",
        desc: "I used the old fabrics in pur home to create a functional foot sacs. This is my way of giving an effort to conserve our environment and apply my knowledge that i have learned in my STS course subject.",
        photos: ["Week 1/image 1.png", "Week 1/image 2.png", "Week 1/image 3.png"]
    },
    {
        week: 2,
        title: "Powering Our Store with Solar Energy",
        desc: "We have a solar panel in our store and I suggested that we make use of solar energy to light our store and conserve electricity and lessen our bill.",
        photos: ["Week 2/image 1.png"]
    },
    {
        week: 3,
        title: "Reusing Containers to Organize and Reduce Waste",
        desc: "I notice the old transparent containers in our home. Instead of throwing it i used it as a placeholder for the goods we sell in our store this way i didn't just help organize  the goods we sell but also help the environment by reusing this containers.",
        photos: ["Week 3/image 1.png", "Week 3/image 2.png", "Week 3/image 3.png", "Week 3/image 4.png", "Week 3/image 5.png", "Week 3/image 6.png",]
    },
    {
        week: 4,
        title: "Egg Tray Turtle: Recycling for Fun and the Environment",
        desc: "Today thinking what else to recycle my cousin asked me to make her a recycled project and I used the old tray of eggs stocked in our store and created a turtle this way I can contribute in our environment by recycling and help my cousin create her project.",
        photos: ["Week 4/image 1.png", "Week 4/image 2.jpg"]
    },
    {
        week: 5,
        title: "Saving Water and Electricity with a Water Pump",
        desc: "Today my environmental conservation effort is instead of using the faucet to get water. I used the water pump to save electricity and water to wash my dishes.",
        photos: ["Week 5/image 1.png", "Week 5/image 2.png", "Week 5/image 3.png"]
    },
    {
        week: 6,
        title: "Turning Old Boxes into Storage and Gift Boxes",
        desc: "Today as my way of helping the environment I use the old boxes stored in our home to create a box that I cam use to store my things, I decirated it to make it loom presentable. I turned it into new box it can also be a used as a gift box.",
        photos: ["Week 6/image 1.png", "Week 6/image 2.png"]
    },
    {
        week: 7,
        title: "Segregating Trash with Trash Bags",
        desc: "Today I bought Trash bays to place it in our trashbins and segregate the trash in our home. In this simple act, I can help the environment by properly segregating the trash and make the job pf trash collector easier.",
        photos: ["Week 7/image 1.png", "Week 7/image 2.png", "Week 7/image 3.png"]
    },
    {
        week: 8,
        title: "Promoting Gender Equality Through Poster Making",
        desc: "Today our school is celebrating National Women's Month. I decided to participate the poster making contest and thankfully i won, In this way i can promote SDG : 5 gender equality and take part of it by spreading awareness through my artwork.",
        photos: ["Week 8/image 1.png", "Week 8/image 2.png", "Week 8/image 3.png", "Week 8/image 4.png"]
    },
    {
        week: 9,
        title: "Using Eco Bags for Groceries",
        desc: "Today we did some errands and go to the market to buy groceries. Insted of using plastic bag we  use eco bag to store the goods we bought.",
        photos: ["Week 9/image 1.png", "Week 9/image 2.png"]
    },
    {
        week: 10,
        title: "Learning IT Skills to Support Quality Education",
        desc: "Through fundlife programming sessions, I advance SDG: 4 Quality education, it helps me to gain more knowledge about my IT skills and digital literacy training that equip me as a student with my future competencies also this also serve as my contribution to mg subject course STS applying mg knowlege about  proper usage of technology.",
        photos: ["Week 10/image 1.jpeg", "Week 10/image 2.jpeg", "Week 10/image 3.jpeg"]
    },
    {
        week: 11,
        title: "Turning Plastic Wrappers into Decorations",
        desc: "Today instead of throwing plastic wrappers that is harmful to pur environment, I decided to cut into strips and make it as a decoration for my future creations and it well be part as my contribution to conserve the environment.",
        photos: ["Week 11/image 1.png", "Week 11/image 2.png"]
    },
    {
        week: 12,
        title: "Reusing Boxes to Organize Our Store",
        desc: "We also have a lot of boxes at home, instead of throwing it we used it as a placeholder of the detergent soap, soap and goods in our store. In this way I can not only help pur store to prganize what we sell but also i can help the environment by reusing the boxes.",
        photos: ["Week 12/image 1.png"]
    },
    {
        week: 13,
        title: "Digital Art for Responsible Consumption and Less Waste",
        desc: "As part of my contribution to pur environment and making use of my learnings in my STS subject course,  I inclined my digital art to SDG 12: Responsible consumption and production, low-waste creative practice, As digital artist I use virtual materials over physical resources demonstrating how creative technology can reduce waste.",
        photos: ["Week 13/image 1.jpeg", "Week 13/image 2.jpg", "Week 13/image 3.jpg", "Week 13/image 4.jpg", "Week 13/image 5.jpg", "Olasiman/Week 13/image 6.png", "Week 13/image 7.jpg",]
    },
    {
        week: 14,
        title: "Creating SDG Letters from Old Boxes for Our Exhibit",
        desc: "By repurposing old boxes to create SDG letters for our STS exhibit, I’m turning waste into educational material, which helps reduce landfill waste while raising awareness on how each SDG contributes to a more sustainable future.",
        photos: ["Week 14/image 1.png", "Week 14/image 2.png", "Week 14/image 3.png"]
    },
    {
        week: 15,
        title: "Using GCash to Cut Waste and Support Digital Access",
        desc: "By choosing GCash over cash, I reduce my use of paper receipts and physical money, which helps lower waste and carbon footprint, while also supporting SDG 9 by promoting access to inclusive, sustainable digital infrastructure that makes financial services faster and more widely available.",
        photos: ["Week 15/image 1.jpg", "Week 15/image 2.jpg", "Week 15/image 3.jpg", "Week 15/image 4.jpg"]
    }
];

// ──────────────────────────────────────────
//  RENDER WEEK SECTIONS
// ──────────────────────────────────────────
const container = document.getElementById('weeksContainer');

weeks.forEach((w, i) => {
    const section = document.createElement('section');
    const isLast = w.week === 15;
    section.className = 'week-section' + (isLast ? ' last-week' : '');
    section.id = `week-${w.week}`;
    section.setAttribute('data-week', w.week);

    const photoClass = isLast ? 'photo-grid cols-3' : 'photo-grid';

    let photosHTML = w.photos.map(photo =>
    `<img src="${photo}" alt="Week ${w.week} documentation" loading="lazy" onerror="this.onerror=null; this.src='https://picsum.photos/seed/${w.week}/200/300.jpg'; this.alt='Image not found in ${photo}';">`
    ).join('');

    let extrasHTML = '';
    if (w.reflection) {
        extrasHTML += `
            <div class="reflection-box">
                <div class="reflection-label">💖 My Reflection</div>
                <p class="reflection-text">${w.reflection}</p>
            </div>`;
    }
    if (w.commitments) {
        const items = w.commitments.map(c => `<li>${c}</li>`).join('');
        extrasHTML += `
            <div class="commitment-box">
                <div class="commitment-label">✨ Habit Commitments</div>
                <ul class="commitment-list">${items}</ul>
            </div>`;
    }

    section.innerHTML = `
        <div class="week-card">
            <div class="week-badge">💖 week ${w.week}</div>
            <h2 class="week-title">${w.title}</h2>
            <div class="${photoClass}">${photosHTML}</div>
            <p class="week-desc">${w.desc}</p>
            ${extrasHTML}
        </div>
    `;

    container.appendChild(section);
});

// ──────────────────────────────────────────
//  SIDE NAVIGATION DOTS
// ──────────────────────────────────────────
const nav = document.getElementById('weekNav');
const allSections = [document.getElementById('heroSection'), ...document.querySelectorAll('.week-section')];

allSections.forEach((sec, i) => {
    const dot = document.createElement('button');
    dot.className = 'week-nav-dot';
    dot.setAttribute('aria-label', i === 0 ? 'Hero' : `Week ${i}`);
    dot.addEventListener('click', () => sec.scrollIntoView({ behavior: 'smooth' }));
    nav.appendChild(dot);
});

const dots = nav.querySelectorAll('.week-nav-dot');

// ──────────────────────────────────────────
//  SCROLL EMPHASIS LOGIC
// ──────────────────────────────────────────
const weekSections = document.querySelectorAll('.week-section');

function updateEmphasis() {
    const vpCenter = window.innerHeight / 2;
    let activeIdx = -1;
    let minDist = Infinity;

    allSections.forEach((sec, i) => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        if (dist < minDist) {
            minDist = dist;
            activeIdx = i;
        }
    });

    dots.forEach((d, i) => d.classList.toggle('active', i === activeIdx));

    weekSections.forEach(sec => {
        const rect = sec.getBoundingClientRect();
        const center = rect.top + rect.height / 2;
        const dist = Math.abs(center - vpCenter);
        const threshold = window.innerHeight * 0.4;

        sec.classList.remove('active', 'near');
        if (dist < threshold * 0.5) {
            sec.classList.add('active');
        } else if (dist < threshold) {
            sec.classList.add('near');
        }
    });
}

window.addEventListener('scroll', updateEmphasis, { passive: true });
window.addEventListener('resize', updateEmphasis);
updateEmphasis();

// ──────────────────────────────────────────
//  FLOATING PARTICLES (Darker & Popping Colors)
// ──────────────────────────────────────────
const particleContainer = document.getElementById('particles');
// Darker, more contrasting colors
const particleColors = [
    'rgba(131, 24, 67, 0.9)',   /* Rose 900 - Dark Berry */
    'rgba(190, 24, 93, 0.8)',   /* Pink 700 - Dark Pink */
    'rgba(219, 39, 119, 0.8)',  /* Pink 600 - Strong Pink */
    'rgba(225, 29, 72, 0.8)',   /* Rose 600 - Reddish Pink */
];

function createParticle() {
    const p = document.createElement('div');
    p.className = 'particle';

    // Increased size for better visibility (3px to 9px)
    const size = Math.random() * 6 + 3;
    const left = Math.random() * 100;
    const dur = Math.random() * 14 + 10;
    const delay = Math.random() * 8;
    const color = particleColors[Math.floor(Math.random() * particleColors.length)];
    const drift = (Math.random() - 0.5) * 60;
    // Increased opacity for better visibility (0.5 to 0.8)
    const opacity = Math.random() * 0.3 + 0.5;

    p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${left}%;
        bottom: -10px;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color};
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        --p-drift: ${drift}px;
        --p-opacity: ${opacity};
    `;

    particleContainer.appendChild(p);
}

for (let i = 0; i < 30; i++) createParticle();

// ──────────────────────────────────────────
//  IMAGE MODAL LOGIC (LIGHTBOX)
// ──────────────────────────────────────────
const modal = document.getElementById("imgModal");
const modalImg = document.getElementById("modalImg");
const captionText = document.getElementById("caption");
const closeModal = document.querySelector(".close-modal");

// Attach click event to all images in the grid
document.querySelectorAll('.photo-grid img').forEach(img => {
    img.addEventListener('click', function() {
        modal.classList.add('show');
        modalImg.src = this.src;
        
        captionText.innerHTML = this.alt.replace(" documentation", "");
        document.body.style.overflow = "hidden"; 
    });
});

function hideModal() {
    modal.classList.remove('show');
    document.body.style.overflow = "auto"; 
}

closeModal.addEventListener('click', hideModal);

modal.addEventListener('click', function(e) {
    if (e.target === modal) {
        hideModal();
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === "Escape" && modal.classList.contains('show')) {
        hideModal();
    }
});
</script>
